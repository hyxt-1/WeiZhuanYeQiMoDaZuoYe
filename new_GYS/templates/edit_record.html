<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑记录 - 观影史</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .edit-record {
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 30px;
            margin-top: 30px;
        }
        .edit-record h3 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 24px;
            color: #1f2937;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #374151;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.2s ease-in-out;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease-in-out;
        }
        .btn-primary {
            background-color: #3b82f6;
            color: white;
        }
        .btn-primary:hover {
            background-color: #2563eb;
        }
        .btn-secondary {
            background-color: #6b7280;
            color: white;
        }
        .btn-secondary:hover {
            background-color: #4b5563;
        }
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
    </style>
</head>
<body>
    <header>
        <h1>观影史</h1>
        <p>记录你的观影历程，分享你的观影体验</p>
    </header>
    
    <nav>
        <a href="/">首页</a>
        {% if not logged_in %}
        <a href="/login">登录</a>
        <a href="/register">注册</a>
        {% endif %}
        <a href="/records">我的记录</a>
        <a href="/add_record">添加记录</a>
        <a href="/shared">分享记录</a>
        <a href="/search">查询分析</a>
        {% if logged_in %}
        <a href="/profile">个人主页</a>
        {% endif %}
    </nav>
    
    <div class="container">
        <div class="user-info">
            <div>
                <h2>编辑记录</h2>
                <p>欢迎回来，{{ user_name }}</p>
            </div>
        </div>
        
        <div class="edit-record">
            <h3>编辑记录</h3>
            <form id="editRecordForm" method="POST" action="/edit_record/{{ record.id }}">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="title">标题</label>
                        <input type="text" id="title" name="title" value="{{ record.title }}" required>
                    </div>
                    <div class="form-group">
                        <label for="type">类型</label>
                        <select id="type" name="type" required>
                            <option value="电影" {% if record.type == '电影' %}selected{% endif %}>电影</option>
                            <option value="电视剧" {% if record.type == '电视剧' %}selected{% endif %}>电视剧</option>
                            <option value="综艺" {% if record.type == '综艺' %}selected{% endif %}>综艺</option>
                            <option value="动漫" {% if record.type == '动漫' %}selected{% endif %}>动漫</option>
                            <option value="小说" {% if record.type == '小说' %}selected{% endif %}>小说</option>
                            <option value="其他" {% if record.type == '其他' %}selected{% endif %}>其他</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="watch_time">观看时间</label>
                        <input type="datetime-local" id="watch_time" name="watch_time" value="{{ record.watch_time.strftime('%Y-%m-%dT%H:%M') if record.watch_time else '' }}">
                    </div>
                    <div class="form-group">
                        <label for="location">地点</label>
                        <input type="text" id="location" name="location" value="{{ record.location or '' }}">
                    </div>
                    <div class="form-group">
                        <label for="people">同行人员</label>
                        <input type="text" id="people" name="people" value="{{ record.people or '' }}">
                    </div>
                    <div class="form-group">
                        <label for="rating">评分</label>
                        <select id="rating" name="rating">
                            <option value="" {% if not record.rating %}selected{% endif %}>无</option>
                            <option value="1" {% if record.rating == 1 %}selected{% endif %}>1星</option>
                            <option value="2" {% if record.rating == 2 %}selected{% endif %}>2星</option>
                            <option value="3" {% if record.rating == 3 %}selected{% endif %}>3星</option>
                            <option value="4" {% if record.rating == 4 %}selected{% endif %}>4星</option>
                            <option value="5" {% if record.rating == 5 %}selected{% endif %}>5星</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="event">事件</label>
                    <textarea id="event" name="event">{{ record.event or '' }}</textarea>
                </div>
                <div class="form-group">
                    <label for="comment">评论</label>
                    <textarea id="comment" name="comment">{{ record.comment or '' }}</textarea>
                </div>
                <div class="form-group">
                    <label for="tags">标签（用顿号分隔）</label>
                    <input type="text" id="tags" name="tags" value="{{ record.tags or '' }}" placeholder="例如：好看、感人、推荐">
                </div>
                <div class="action-buttons">
                    <button type="submit" class="btn btn-primary">保存修改</button>
                    <a href="/record_detail/{{ record.id }}" class="btn btn-secondary">取消</a>
                </div>
            </form>
        </div>
    </div>
    
    <footer>
        <p>&copy; 2026 观影史 - 记录你的观影历程，分享你的观影体验</p>
    </footer>
</body>
</html>
