<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员重置密码 - 观影史</title>
    <link rel="stylesheet" href="/static/css/auth.css">
    <style>
        .admin-notice {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            color: #856404;
        }
        .admin-notice h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
        }
        .admin-notice p {
            margin: 0;
            font-size: 14px;
        }
        .back-link {
            text-align: center;
            margin-top: 15px;
        }
        .back-link a {
            color: #3498db;
            text-decoration: none;
        }
        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>观影史</h1>
            <p>管理员密码重置</p>
        </div>
        
        <div class="admin-notice">
            <h3>⚠️ 管理员验证</h3>
            <p>请输入管理员密码和需要重置密码的用户名。重置后密码将恢复为默认密码。</p>
        </div>
        
        <form id="resetForm" method="POST" action="/admin_reset_password">
            <div class="form-group">
                <label for="admin_password">管理员密码</label>
                <div class="input-wrapper">
                    <input type="password" id="admin_password" name="admin_password" required placeholder="请输入管理员密码">
                </div>
            </div>
            
            <div class="form-group">
                <label for="username">需要重置的用户名</label>
                <div class="input-wrapper">
                    <input type="text" id="username" name="username" required placeholder="请输入用户名">
                </div>
            </div>
            
            <button type="submit" class="btn">重置密码</button>
            
            <div class="back-link">
                <a href="/login">返回登录</a>
            </div>
            
            <div class="footer">
                <p>&copy; 2026 观影史 - 记录你的观影历程</p>
            </div>
        </form>
    </div>
    
    <script>
        document.getElementById('resetForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const adminPassword = document.getElementById('admin_password').value;
            const username = document.getElementById('username').value;
            
            // 清除之前的消息
            const existingMessage = document.querySelector('.error-message, .success-message');
            if (existingMessage) {
                existingMessage.remove();
            }
            
            fetch('/admin_reset_password', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: `admin_password=${encodeURIComponent(adminPassword)}&username=${encodeURIComponent(username)}`
            })
            .then(response => response.json())
            .then(data => {
                const messageDiv = document.createElement('div');
                messageDiv.className = data.success ? 'success-message' : 'error-message';
                messageDiv.textContent = data.message;
                
                const form = document.getElementById('resetForm');
                form.insertBefore(messageDiv, form.firstChild);
                
                if (data.success) {
                    // 重置成功后清空表单
                    document.getElementById('resetForm').reset();
                }
            })
            .catch(error => {
                const errorDiv = document.createElement('div');
                errorDiv.className = 'error-message';
                errorDiv.textContent = '操作失败，请稍后重试';
                
                const form = document.getElementById('resetForm');
                form.insertBefore(errorDiv, form.firstChild);
            });
        });
    </script>
</body>
</html>
