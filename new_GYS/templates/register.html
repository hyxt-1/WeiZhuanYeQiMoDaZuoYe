<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 观影史</title>
    <link rel="stylesheet" href="/static/css/auth.css">
</head>
<body>
    <div class="register-container">
        <div class="logo">
            <h1>观影史</h1>
            <p>记录你的观影历程，分享你的观影体验</p>
        </div>
        
        <h2>创建账号</h2>
        
        <form id="registerForm" method="POST" action="/register">
            <div class="form-group">
                <label for="username">用户名</label>
                <div class="input-wrapper">
                    <input type="text" id="username" name="username" required>
                </div>
            </div>
            
            <div class="form-group">
                <label for="password">密码</label>
                <div class="input-wrapper">
                    <input type="password" id="password" name="password" required>
                </div>
            </div>
            
            <div class="form-group">
                <label for="confirmPassword">确认密码</label>
                <div class="input-wrapper">
                    <input type="password" id="confirmPassword" name="confirmPassword" required>
                </div>
            </div>
            
            <button type="submit" class="btn">注册</button>
            
            <div class="login-link">
                已有账号？<a href="/login">立即登录</a>
            </div>
            
            <div class="footer">
                <p>&copy; 2026 观影史 - 记录你的观影历程</p>
            </div>
        </form>
    </div>
    
    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            // 清除之前的错误信息
            const existingError = document.querySelector('.error-message');
            if (existingError) {
                existingError.remove();
            }
            
            // 验证密码是否匹配
            if (password !== confirmPassword) {
                const errorDiv = document.createElement('div');
                errorDiv.className = 'error-message';
                errorDiv.textContent = '两次输入的密码不一致，请重新输入';
                
                const form = document.getElementById('registerForm');
                form.insertBefore(errorDiv, form.firstChild);
                return;
            }
            
            fetch('/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}&confirmPassword=${encodeURIComponent(confirmPassword)}`
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    const errorDiv = document.createElement('div');
                    errorDiv.className = 'error-message';
                    errorDiv.textContent = data.error;
                    
                    const form = document.getElementById('registerForm');
                    form.insertBefore(errorDiv, form.firstChild);
                } else if (data.success) {
                    window.location.href = '/records';
                }
            })
            .catch(error => {
                const errorDiv = document.createElement('div');
                errorDiv.className = 'error-message';
                errorDiv.textContent = '注册失败，请稍后重试';
                
                const form = document.getElementById('registerForm');
                form.insertBefore(errorDiv, form.firstChild);
            });
        });
    </script>
</body>
</html>
