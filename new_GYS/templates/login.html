<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 观影史</title>
    <link rel="stylesheet" href="/static/css/auth.css">
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>观影史</h1>
            <p>记录你的观影历程，分享你的观影体验</p>
        </div>
        
        <h2>欢迎回来</h2>
        
        <form id="loginForm" method="POST" action="/login">
            <div class="form-group">
                <label for="username">用户名</label>
                <div class="input-wrapper">
                    <input type="text" id="username" name="username" required>
                </div>
            </div>
            
            <div class="form-group">
                <label for="password">密码</label>
                <div class="input-wrapper">
                    <input type="password" id="password" name="password" required>
                </div>
            </div>
            
            <button type="submit" class="btn">登录</button>
            
            <div class="forgot-password-link" style="text-align: center; margin: 15px 0;">
                <a href="/admin_reset_password" style="color: #666; font-size: 14px; text-decoration: none;">忘记密码？</a>
            </div>
            
            <div class="register-link">
                没有账号？<a href="/register">立即注册</a>
            </div>
            
            <div class="footer">
                <p>&copy; 2026 观影史 - 记录你的观影历程</p>
            </div>
        </form>
    </div>
    
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // 清除之前的错误信息
            const existingError = document.querySelector('.error-message');
            if (existingError) {
                existingError.remove();
            }
            
            fetch('/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    const errorDiv = document.createElement('div');
                    errorDiv.className = 'error-message';
                    errorDiv.textContent = data.error;
                    
                    const form = document.getElementById('loginForm');
                    form.insertBefore(errorDiv, form.firstChild);
                } else if (data.success) {
                    window.location.href = '/records';
                }
            })
            .catch(error => {
                const errorDiv = document.createElement('div');
                errorDiv.className = 'error-message';
                errorDiv.textContent = '登录失败，请稍后重试';
                
                const form = document.getElementById('loginForm');
                form.insertBefore(errorDiv, form.firstChild);
            });
        });
    </script>
</body>
</html>
